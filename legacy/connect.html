<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASHISH.EXE - Contact Card</title>
  
  <link rel="stylesheet" href="src/css/variables.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* CONTACT CARD - Digital Business Card / vCard Landing */
    /* ═══════════════════════════════════════════════════════════════ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--portfolio-bg);
      color: var(--portfolio-text);
      font-family: "IBM Plex Mono", monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .connect-container {
      width: 100%;
      max-width: 400px;
      background: var(--portfolio-panel);
      border: 2px solid var(--portfolio-border);
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
      overflow: hidden;
      animation: cardSlideIn 0.5s ease-out;
    }

    @keyframes cardSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* HEADER - Profile Section */
    /* ═══════════════════════════════════════════════════════════════ */

    .connect-header {
      background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, rgba(123, 97, 255, 0.1) 100%);
      border-bottom: 2px solid var(--portfolio-border);
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .connect-avatar {
      width: 100px;
      height: 100px;
      border: 2px solid var(--portfolio-border);
      border-radius: 0;
      margin: 0 auto 1rem;
      background: var(--portfolio-panel);
      object-fit: cover;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }

    .connect-name {
      font-family: "Silkscreen", monospace;
      font-size: 1.5rem;
      color: var(--portfolio-border);
      margin-bottom: 0.25rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .connect-title {
      font-size: 0.95rem;
      color: var(--portfolio-secondary);
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .connect-status {
      font-size: 0.8rem;
      color: var(--portfolio-accent);
      display: inline-block;
      background: rgba(255, 75, 129, 0.15);
      border: 1px solid var(--portfolio-accent);
      padding: 0.25rem 0.75rem;
      letter-spacing: 0.5px;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* QUICK ACTIONS */
    /* ═══════════════════════════════════════════════════════════════ */

    .connect-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      padding: 1rem;
      background: rgba(0, 229, 255, 0.03);
      border-bottom: 1px solid var(--portfolio-border);
    }

    .action-btn {
      background: none;
      border: 2px solid var(--portfolio-border);
      color: var(--portfolio-border);
      padding: 0.7rem 1rem;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
      text-transform: uppercase;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .action-btn:hover {
      background: rgba(0, 229, 255, 0.15);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    /* Special button colors */
    .btn-save {
      background: rgba(255, 75, 129, 0.2);
      border-color: var(--portfolio-accent);
      color: var(--portfolio-accent);
      grid-column: 1 / -1;
    }

    .btn-save:hover {
      box-shadow: 0 0 15px rgba(255, 75, 129, 0.3);
      text-shadow: 0 0 8px rgba(255, 75, 129, 0.5);
    }

    .phone-toggle {
      cursor: pointer;
      position: relative;
    }

    .phone-masked::after {
      content: " [TAP TO REVEAL]";
      font-size: 0.75rem;
      opacity: 0.7;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* SOCIAL LINKS */
    /* ═══════════════════════════════════════════════════════════════ */

    .connect-socials {
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--portfolio-border);
    }

    .social-label {
      font-size: 0.75rem;
      color: var(--portfolio-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: block;
    }

    .social-links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .social-link {
      background: none;
      border: 1px solid var(--portfolio-secondary);
      color: var(--portfolio-secondary);
      padding: 0.6rem;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-align: center;
    }

    .social-link:hover {
      background: rgba(123, 97, 255, 0.2);
      border-color: var(--portfolio-border);
      color: var(--portfolio-border);
      box-shadow: 0 0 10px rgba(123, 97, 255, 0.2);
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* FOOTER */
    /* ═══════════════════════════════════════════════════════════════ */

    .connect-footer {
      padding: 1rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid var(--portfolio-border);
    }

    .footer-link {
      color: var(--portfolio-accent);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }

    .footer-link:hover {
      color: var(--portfolio-border);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
    }

    .qr-hint {
      font-size: 0.75rem;
      color: var(--portfolio-secondary);
      margin-top: 0.75rem;
      opacity: 0.7;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* MODAL - QR Code Display */
    /* ═══════════════════════════════════════════════════════════════ */

    .qr-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .qr-modal.active {
      display: flex;
    }

    .qr-modal-content {
      background: var(--portfolio-panel);
      border: 2px solid var(--portfolio-border);
      padding: 2rem;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
    }

    .qr-modal-title {
      font-family: "Silkscreen", monospace;
      color: var(--portfolio-border);
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }

    .qr-placeholder {
      width: 250px;
      height: 250px;
      background: #fff;
      border: 2px solid var(--portfolio-border);
      margin: 1rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #000;
    }

    .qr-placeholder img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .qr-close {
      background: none;
      border: 2px solid var(--portfolio-accent);
      color: var(--portfolio-accent);
      padding: 0.6rem 1.2rem;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 1px;
      margin-top: 1rem;
      transition: all 0.3s;
    }

    .qr-close:hover {
      background: rgba(255, 75, 129, 0.2);
      box-shadow: 0 0 15px rgba(255, 75, 129, 0.3);
    }

    .qr-hint-modal {
      font-size: 0.8rem;
      color: var(--portfolio-secondary);
      margin-top: 1rem;
      opacity: 0.8;
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* MOBILE RESPONSIVE */
    /* ═══════════════════════════════════════════════════════════════ */

    @media (max-width: 480px) {
      body {
        padding: 0.5rem;
      }

      .connect-header {
        padding: 1.5rem 1rem;
      }

      .connect-avatar {
        width: 80px;
        height: 80px;
        margin-bottom: 0.75rem;
      }

      .connect-name {
        font-size: 1.3rem;
      }

      .connect-title {
        font-size: 0.85rem;
      }

      .connect-actions {
        grid-template-columns: 1fr;
        gap: 0.5rem;
        padding: 0.75rem;
      }

      .action-btn {
        padding: 0.6rem;
        font-size: 0.75rem;
      }

      .connect-socials {
        padding: 1rem;
      }

      .social-links {
        grid-template-columns: 1fr;
        gap: 0.4rem;
      }

      .qr-modal-content {
        padding: 1.5rem;
        max-width: 90vw;
      }

      .qr-placeholder {
        width: 200px;
        height: 200px;
      }
    }

    /* ═══════════════════════════════════════════════════════════════ */
    /* PRINT STYLES */
    /* ═══════════════════════════════════════════════════════════════ */

    @media print {
      body {
        background: white;
      }

      .connect-container {
        box-shadow: none;
        max-width: 100%;
      }

      .action-btn,
      .social-link {
        border-color: #000;
        color: #000;
      }

      .qr-modal {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- CONTACT CARD -->
  <div class="connect-container">
    
    <!-- HEADER - PROFILE -->
    <div class="connect-header">
      <img src="assets/avatar.png?v=1" alt="Ashish" class="connect-avatar">
      <h1 class="connect-name">ASHISH.EXE</h1>
      <p class="connect-title">Engineer • Maker • Systems Nerd</p>
      <span class="connect-status">ONLINE</span>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="connect-actions">
      <a href="tel:+919876543210" class="action-btn" title="Call">
        📞 CALL
      </a>
      <a href="mailto:gator77@t3jiyami.page" class="action-btn" title="Email">
        ✉️ EMAIL
      </a>
      <button class="action-btn btn-save" onclick="downloadVCard()" title="Save to Contacts">
        💾 SAVE CONTACT
      </button>
    </div>

    <!-- SOCIAL LINKS -->
    <div class="connect-socials">
      <span class="social-label">CONNECT</span>
      <div class="social-links">
        <a href="https://github.com/yami-sutrxt3ji" target="_blank" class="social-link">GitHub</a>
        <a href="https://instagram.com/" target="_blank" class="social-link">Instagram</a>
        <a href="https://linkedin.com/in/ashish-kumar-9a5b4b" target="_blank" class="social-link">LinkedIn</a>
        <a href="https://t3jiyami.page" target="_blank" class="social-link">Website</a>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="connect-footer">
      <p>
        <a href="index.html" class="footer-link">← BACK TO PORTFOLIO</a>
      </p>
      <button 
        style="background: none; border: none; color: inherit; cursor: pointer; font-family: inherit; text-decoration: underline; font-size: 0.8rem; padding: 0.5rem; opacity: 0.7; transition: all 0.3s;"
        onmouseover="this.style.opacity='1'; this.style.textShadow='0 0 8px rgba(0, 229, 255, 0.5)'"
        onmouseout="this.style.opacity='0.7'; this.style.textShadow='none'"
        onclick="showQRCode()"
      >
        [ VIEW QR CODE ]
      </button>
      <p class="qr-hint">📱 Scan QR to share</p>
    </div>
  </div>

  <!-- QR CODE MODAL -->
  <div class="qr-modal" id="qrModal">
    <div class="qr-modal-content">
      <div class="qr-modal-title">SCAN TO CONNECT</div>
      <div class="qr-placeholder" id="qrContainer">
        <img src="assets/qr-code.png" alt="QR Code" style="max-width: 100%; max-height: 100%;">
      </div>
      <p style="color: var(--portfolio-text); font-size: 0.85rem;">t3jiyami.page/connect</p>
      <button class="qr-close" onclick="closeQRCode()">[ CLOSE ]</button>
      <p class="qr-hint-modal">
        💡 Right-click to download<br>
        or take a screenshot
      </p>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // CONTACT CARD FUNCTIONALITY
    // ═══════════════════════════════════════════════════════════════

    // DOWNLOAD vCARD
    function downloadVCard() {
      const vCardContent = `BEGIN:VCARD
VERSION:3.0
FN:Ashish
N:Ashish;;;;
ORG:GITAM Hyderabad
TITLE:Engineer & Maker
TEL:+919876543210
EMAIL:gator77@t3jiyami.page
URL:https://t3jiyami.page
URL:https://github.com/yami-sutrxt3ji
NOTE:CS Student | Builder | Systems Engineer
END:VCARD`;

      const blob = new Blob([vCardContent], { type: 'text/vcard' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ashish-contact.vcf';
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);

      // Feedback
      alert('✅ Contact saved!\n\nImport ashish-contact.vcf into your phone contacts.');
    }

    // QR CODE MODAL
    function showQRCode() {
      document.getElementById('qrModal').classList.add('active');
    }

    function closeQRCode() {
      document.getElementById('qrModal').classList.remove('active');
    }

    // Close on ESC key
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        closeQRCode();
      }
    });

    // Close modal on background click
    document.getElementById('qrModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeQRCode();
      }
    });

    // Phone number privacy: tap to reveal (optional)
    function revealPhone() {
      const phoneBtn = document.querySelector('[title="Call"]');
      if (phoneBtn) {
        phoneBtn.classList.toggle('phone-masked');
      }
    }

    // Track engagement
    console.log('%cASHISH.EXE CONTACT CARD', 'font-size: 1.2rem; font-weight: bold; color: #00e5ff;');
    console.log('Welcome! This is a web-based digital business card.');
    console.log('Scan the QR code to share or save contact to your phone.');
  </script>
</body>
</html>
